<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dávidova cesta</title>
  <!-- Klasický <link> (žiadne moduly) — appka musí bežať z file:// bez servera -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
    16:9 javisko premietané na stenu. INTRO.png aj MAPA.jfif sú presne 1672×941 (16:9),
    takže obrázok vyplní javisko bez orezu a bez skreslenia.
  -->
  <div class="stage">

    <!-- 1) INTRO -->
    <section id="obrazovka-intro" class="obrazovka">
      <img class="pozadie" src="app_images/INTRO.png" alt="Dobrodružstvo s Dávidom" />
      <!-- Priehľadná klikacia zóna presne nad zapečeným tlačidlom ZAČAŤ v obrázku -->
      <button id="tlacidlo-zacat" class="klik-zona" type="button">
        <span class="sr-only">Začať</span>
      </button>
    </section>

    <!-- 2) MAPA -->
    <section id="obrazovka-mapa" class="obrazovka skryta">
      <img class="pozadie" src="app_images/MAPA.jfif" alt="Mapa Dávidovej cesty" />
      <!-- Zastávky vykreslí app.js zo stavu (dátami riadený návrh) -->
      <div id="zastavky" class="zastavky"></div>
    </section>

    <!-- Burger menu operátora (vždy dostupné, nenápadné v rohu) -->
    <div class="menu">
      <button id="menu-tlacidlo" class="menu-tlacidlo" type="button"
              aria-label="Menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5"  width="18" height="2.4" rx="1.2"></rect>
          <rect x="3" y="11" width="18" height="2.4" rx="1.2"></rect>
          <rect x="3" y="17" width="18" height="2.4" rx="1.2"></rect>
        </svg>
      </button>
      <div id="menu-obsah" class="menu-obsah skryta">
        <button id="tlacidlo-reset" class="menu-polozka" type="button">Vynulovať postup</button>
      </div>
    </div>

    <!--
      Obr.3 CLUE PERGAMEN — voľne rozmiestnené clue slová dňa; vedúci klikne ĎALEJ.
      Neutrálny (neodhaľuje názov lokácie, BR-003). Slová vykreslí app.js zo stavu.
      Prekrytie (.pergamen-obal) je zároveň tlmivé pozadie modálu nad mapou.
    -->
    <div id="clue-pergamen" class="pergamen-obal skryta" role="dialog" aria-modal="true"
         aria-label="Indície pre dnešné heslo">
      <div class="pergamen">
        <img class="pergamen-pozadie" src="app_images/pregamen.png" alt="" />
        <!-- Voľne rozmiestnené clue slová (pozície z DNI[].clue) v písacej ploche -->
        <div class="pergamen-plocha">
          <div id="clue-slova" class="clue-slova"></div>
          <button id="tlacidlo-dalej" class="tlacidlo tlacidlo-hlavne pergamen-akcia"
                  type="button">Ďalej</button>
        </div>
      </div>
    </div>

    <!--
      Obr.4 HESLO PERGAMEN — zadanie hesla + ODOMKNÚŤ. Rovnaký štýl pergamenu.
      Pri nesprávnom hesle sa pergamen zatrasie (obr.5) a ukáže neutrálnu správu.
    -->
    <div id="heslo-pergamen" class="pergamen-obal skryta" role="dialog" aria-modal="true"
         aria-labelledby="heslo-vyzva">
      <div id="heslo-pergamen-panel" class="pergamen">
        <!-- Pozadie: pri správnom hesle app.js vymení src za ODOMKNUTIE.png (odopnutý zámok) -->
        <img id="heslo-pozadie" class="pergamen-pozadie" src="app_images/pregamen.png" alt="" />
        <!-- Obsah sa pri odomknutí skryje (trieda .skryta), aby ostal vidieť odopnutý zámok -->
        <div id="heslo-obsah" class="pergamen-plocha">
          <div class="pergamen-obsah">
            <label id="heslo-vyzva" class="pergamen-vyzva" for="pole-heslo">
              Zadajte dnešné heslo.
            </label>
            <input id="pole-heslo" class="pole-heslo" type="text"
                   autocomplete="off" autocapitalize="characters" spellcheck="false" />
            <p id="sprava-heslo" class="sprava-heslo" aria-live="polite"></p>
            <div class="modal-tlacidla">
              <button id="tlacidlo-zrusit" class="tlacidlo" type="button">Zrušiť</button>
              <button id="tlacidlo-odomknut" class="tlacidlo tlacidlo-hlavne" type="button">Odomknúť</button>
            </div>
          </div>
        </div>
        <!--
          Odhalenie symbolu (obr.7): po odopnutom zámku app.js sem vloží symbol dňa
          a jeho názov, chvíľu ich podrží, potom zavrie pergamen a prekreslí mapu.
          Obsah (src/text) sa vkladá AŽ po uložení stavu (BR-003, žiadny spoiler vopred).
          Skrytý cez .skryta, kým beží zadávanie hesla.
        -->
        <div id="heslo-symbol" class="pergamen-plocha heslo-symbol skryta">
          <img id="heslo-symbol-obr" class="heslo-symbol-obr" alt="" />
          <p id="heslo-symbol-nazov" class="heslo-symbol-nazov"></p>
        </div>
      </div>
    </div>

    <!--
      Fáza 5 — D5 finálna sekvencia (obr.11–15). Obrázky a kód truhlice sa do DOM
      vkladajú AŽ pri spustení finále v app.js (BR-003 — žiadny budúci obsah vopred).
      Obr.10 (finálna mapa so svetelnou vlnou) nepotrebuje vlastný blok — je to mapa.
    -->

    <!-- Obr.11 ZÁVEREČNÁ OBRAZOVKA — Jeruzalem v zlatom svetle + záverečné texty -->
    <div id="finale-zaverecna" class="finale-obal skryta">
      <img id="zaverecna-obr" class="zaverecna-obr" alt="" />
      <p class="zaverecna-hlavny">Dávidova cesta sa skončila…</p>
      <p class="zaverecna-vedlajsi">Ale tvoja cesta s Bohom pokračuje.</p>
    </div>

    <!-- Obr.12 MYSTERY CIRCLE — kruh s otáznikom; vedúci naň klikne -->
    <div id="finale-mystery" class="finale-obal skryta">
      <p class="finale-nadpis">Prekvapenie</p>
      <button id="mystery-totem" class="mystery-totem" type="button"
              aria-label="Otvoriť prekvapenie">
        <img id="mystery-obr" alt="" />
      </button>
      <p class="finale-podtext">Získaj niečo, čo ťa na tvojej ceste dobrodružstvom poteší.</p>
    </div>

    <!--
      Obr.13 PERGAMEN — SYMBOLY A ČÍSLICE (náhodné poradie); deti hádajú kód.
      Obr.14 KÓD 13177 sa objaví V TEJ ISTEJ obrazovke — pergamen NEZMIZNE, len sa
      naň prekryje kód. Žiadny prechod cez mapu → plynulé (Jakub, S6 pripomienka).
    -->
    <div id="finale-sifra" class="finale-obal skryta">
      <img id="sifra-obr" class="sifra-obr" alt="Pergamen so symbolmi a číslicami" />
      <button id="sifra-dalej" class="tlacidlo tlacidlo-hlavne finale-dalej"
              type="button">Ďalej</button>
      <!-- Kód 13177 (obr.14): skrytý, kým vedúci neklikne Ďalej. Prekryv nad pergamenom. -->
      <div id="kod-blok" class="kod-blok skryta">
        <p id="kod-cislo" class="kod-cislo"></p>
        <p class="kod-popis">Kód od pokladu</p>
        <button id="kod-dalej" class="tlacidlo tlacidlo-hlavne" type="button">Ďalej</button>
      </div>
    </div>

    <!-- Obr.15 OTVORENÁ TRUHLICA — koniec aplikácie; žiadny text, moment vyznieva -->
    <div id="finale-truhlica" class="finale-obal skryta">
      <img id="truhlica-obr" class="truhlica-obr" alt="Otvorená truhlica pokladu" />
    </div>

  </div>

  <!-- Klasický <script> na konci tela — žiadny modul, žiadny fetch (kvôli file://) -->
  <script src="app.js"></script>
</body>
</html>
